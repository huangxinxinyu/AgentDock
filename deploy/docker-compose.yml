services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: agentdock
      POSTGRES_USER: agentdock
      POSTGRES_PASSWORD: agentdock
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentdock -d agentdock"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - agentdock-postgres:/var/lib/postgresql/data

volumes:
  agentdock-postgres:
